<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skarpa Logística - Painel de Controle</title>
    <meta name="description" content="Visualização da planilha de dados.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Supabase SDK e Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <!-- SheetJS for Excel Import -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="icon" type="image/png" href="logo em png.png">
</head>
<body>
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Layout wrapper: sidebar + main -->
    <div class="app-layout">

        <!-- ── SIDEBAR ───────────────────────────────────────────── -->
        <aside class="sidebar">
            <!-- Logo -->
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon" style="background: white; padding: 2px;">
                    <img src="logo%20em%20png.png" alt="Skarpa Logística" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <span class="sidebar-logo-text">Skarpa Logística</span>
            </div>

            <!-- Navigation items -->
            <nav class="sidebar-nav">
                <div class="sidebar-dropdown">
                    <a href="#" class="sidebar-link active" id="navPlanilha">
                        <i class="fa-solid fa-table-cells-large"></i>
                        <span>Planilha</span>
                        <i class="fa-solid fa-chevron-down dropdown-arrow" style="margin-left: auto; font-size: 11px; transition: transform 0.2s;"></i>
                    </a>
                    <div class="sidebar-submenu" id="planilhaSubmenu" style="display: none; padding-left: 20px; flex-direction: column; gap: 4px; margin-top: 4px;">
                        <a href="#" class="sidebar-sublink" id="btnNewCondo" style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; color: #94a3b8; font-size: 13px; text-decoration: none; border-radius: 6px; transition: all 0.2s;">
                            <i class="fa-solid fa-plus"></i>
                            <span>Novo Condomínio</span>
                        </a>
                    </div>
                </div>
                <a href="#" class="sidebar-link" id="navAguaDesinsetizacao">
                    <i class="fa-solid fa-droplet"></i>
                    <span>Água e Desinsetização</span>
                </a>
                <a href="#" class="sidebar-link" id="navAguaDesinsetizacaoEmail">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Água e Desinsetização Email</span>
                </a>
                <a href="#" class="sidebar-link" id="navAgua">
                    <i class="fa-solid fa-faucet"></i>
                    <span>Água</span>
                </a>
                <a href="#" class="sidebar-link" id="navAguaEmail">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    <span>Água Email</span>
                </a>
                <a href="#" class="sidebar-link" id="navBoletoMaos">
                    <i class="fa-solid fa-hand-holding-dollar"></i>
                    <span>Boleto em Mãos</span>
                </a>
                <a href="#" class="sidebar-link" id="navNotaFiscal">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>Nota Fiscal</span>
                </a>
                <a href="#" class="sidebar-link" id="navFinanceiro">
                    <i class="fa-solid fa-wallet"></i>
                    <span>Financeiro</span>
                </a>
                <a href="#" class="sidebar-link" id="navExcluidos">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Excluídos</span>
                </a>
                <label for="importInput" class="sidebar-link" id="btnImport" style="cursor:pointer;">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Importar</span>
                </label>
                <a href="#" class="sidebar-link" id="btnExport">
                    <i class="fa-solid fa-download"></i>
                    <span>Exportar</span>
                </a>
            </nav>

            <!-- Bottom: user + logout -->
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <span id="userGreeting">Admin</span>
                </div>
                <button id="btnLogout" class="sidebar-logout" title="Sair">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </aside>

        <!-- ── MAIN CONTENT ──────────────────────────────────────── -->
        <main class="dash-content">
            <!-- Page header -->
            <div class="content-header">
                <div class="title-section">
                    <h1>Planilha de Dados</h1>
                    <p>Visualize suas informações no formato original do Excel.</p>
                </div>
                <div id="headerCategoryContainer" style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-left: 30px;"></div>
            </div>



            <!-- Spreadsheet Card -->
            <div class="spreadsheet-card">
                <div class="excel-tabs" id="excelTabs"></div>
                <div class="table-responsive" id="tableContainer">
                    <!-- Data will be populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Novo Condomínio -->
    <div id="newCondoModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div style="background: #1e293b; color: #f1f5f9; padding: 25px; border-radius: 12px; border: 1px solid #475569; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 18px; font-weight: 600; margin: 0; color: white;">Adicionar Novo Condomínio</h2>
                <button id="closeNewCondoModal" style="background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="newCondoForm" style="display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">Nome do Condomínio</label>
                    <input type="text" id="condoName" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">CNPJ</label>
                    <input type="text" id="condoCNPJ" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">Rua</label>
                    <input type="text" id="condoRua" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">Bairro</label>
                    <input type="text" id="condoBairro" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">CEP</label>
                    <input type="text" id="condoCEP" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 13px; color: #94a3b8;">Cidade</label>
                    <input type="text" id="condoCidade" required style="background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px;">
                </div>
                <button type="submit" style="background: #6366f1; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s;">Criar Condomínio</button>
            </form>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="importInput" accept=".xlsx, .xls" style="display:none;">

    <script type="module" src="dashboard.js"></script>
</body>
</html>
