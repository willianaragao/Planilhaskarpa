<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skarpa Logística - Login</title>
    <meta name="description" content="Tela de acesso ao painel de controle da planilha.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-area" style="background: white; padding: 4px;">
                    <img src="logo%20em%20png.png" alt="Skarpa Logística" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <h1>Bem-vindo de volta</h1>
                <p>Insira suas credenciais para acessar a planilha</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Lembrar de mim</label>
                    </div>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <div id="errorMessage" class="error-message">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Usuário ou senha incorretos.</span>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">Entrar</span>
                    <i class="fa-solid fa-arrow-right"></i>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
